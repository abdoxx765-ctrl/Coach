<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>دفتر الكوتش</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --pool-deep:#0B3954;
    --pool-mid:#146C94;
    --pool-bright:#19A7CE;
    --foam:#F3FAFB;
    --coral:#FF6F59;
    --coral-dark:#E2563F;
    --ink:#0B3954;
    --muted:#5C7C8A;
    --card-bg:#FFFFFF;
    --border:#DDEDF1;
    --danger:#D14848;
    --radius:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Tajawal',sans-serif;
    background:var(--foam);
    color:var(--ink);
    min-height:100vh;
    -webkit-tap-highlight-color:transparent;
  }
  h1,h2,h3,.display{font-family:'Cairo',sans-serif;}
  button{font-family:inherit;cursor:pointer;}
  input,textarea{font-family:inherit;}
  ::selection{background:var(--pool-bright);color:#fff;}

  #app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    background:var(--foam);
    position:relative;
    padding-bottom:96px;
  }

  /* ---------- lane-rope divider (signature element) ---------- */
  .lane-rope{
    height:10px;
    width:100%;
    background-image: radial-gradient(circle, var(--coral) 0 3px, transparent 3.5px),
                       radial-gradient(circle, var(--pool-mid) 0 3px, transparent 3.5px);
    background-size: 28px 10px, 28px 10px;
    background-position: 0 0, 14px 0;
    background-repeat: repeat-x;
    opacity:0.9;
  }

  /* ---------- header ---------- */
  header.top{
    background:linear-gradient(160deg, var(--pool-deep), var(--pool-mid));
    color:#fff;
    padding:28px 20px 22px;
    border-radius:0 0 28px 28px;
    position:relative;
    overflow:hidden;
  }
  header.top::after{
    content:"";
    position:absolute;
    inset:auto -20% -60% -20%;
    height:140px;
    background:radial-gradient(ellipse at center, rgba(255,255,255,0.10), transparent 70%);
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand svg{flex:none;}
  .brand h1{margin:0;font-size:21px;font-weight:800;letter-spacing:.2px;}
  .brand .sub{margin:2px 0 0;font-size:12.5px;color:#CDE9F2;font-weight:400;}

  .back-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .back-btn, .print-btn{
    background:rgba(255,255,255,0.14);
    border:none;color:#fff;
    border-radius:10px;
    padding:7px 12px;
    font-size:13.5px;
    display:flex;align-items:center;gap:6px;
    font-weight:700;
  }
  .back-btn:focus-visible, .print-btn:focus-visible{outline:2px solid #fff;outline-offset:2px;}
  
  .print-btn{ background: var(--pool-bright); }

  /* ---------- content ---------- */
  main{padding:18px 16px 8px;}
  .section-title{
    font-size:14px;
    font-weight:700;
    color:var(--muted);
    margin:18px 2px 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .link-btn {
    font-size: 13px;
    color: var(--pool-mid);
    background: none;
    border: none;
    font-weight: 700;
    text-decoration: underline;
  }

  /* ---------- group cards ---------- */
  .group-card{
    background:var(--card-bg);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:0;
    margin-bottom:14px;
    overflow:hidden;
    box-shadow:0 1px 2px rgba(11,57,84,0.04);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .group-card:active{transform:scale(0.98);}
  .group-card .gc-top{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 16px 14px;
    width:100%;background:none;border:none;text-align:right;
  }
  .gc-name{font-size:16.5px;font-weight:700;color:var(--ink);margin:0 0 3px;}
  .gc-meta{font-size:12.5px;color:var(--muted);margin:0;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .gc-badge{
    flex:none;
    width:54px;height:54px;border-radius:50%;
    background:var(--foam);
    border:2px solid var(--pool-bright);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:var(--pool-deep);
  }
  .gc-badge .n{font-family:'Cairo',sans-serif;font-weight:800;font-size:19px;line-height:1;}
  .gc-badge .l{font-size:8.5px;color:var(--muted);margin-top:1px;}
  .group-card:focus-visible .gc-top{outline:2px solid var(--pool-mid);outline-offset:-2px;}

  /* ---------- empty state ---------- */
  .empty{
    text-align:center;
    padding:48px 24px;
    color:var(--muted);
  }
  .empty svg{margin-bottom:14px;opacity:.8;}
  .empty p{font-size:14.5px;margin:0 0 18px;line-height:1.7;}

  /* ---------- floating add button ---------- */
  .fab{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%);
    max-width:480px;
    width:calc(100% - 32px);
    margin:0 16px;
    z-index:20;
  }
  .fab-inner{
    background:var(--coral);
    color:#fff;
    border:none;
    width:100%;
    padding:15px 18px;
    border-radius:14px;
    font-size:15px;
    font-weight:700;
    display:flex;align-items:center;justify-content:center;gap:8px;
    box-shadow:0 8px 20px rgba(255,111,89,0.35);
  }
  .fab-inner:active{background:var(--coral-dark);}
  .fab-inner:focus-visible{outline:2px solid var(--pool-deep);outline-offset:2px;}

  /* ---------- stat block ---------- */
  .stat-block{
    background:linear-gradient(160deg, var(--pool-deep), var(--pool-mid));
    border-radius:var(--radius);
    padding:22px 20px;
    color:#fff;
    text-align:center;
    margin-bottom:6px;
  }
  .stat-block .big{
    font-family:'Cairo',sans-serif;
    font-weight:800;
    font-size:44px;
    line-height:1;
  }
  .stat-block .lbl{font-size:13px;color:#CDE9F2;margin-top:6px;}

  /* ---------- month pills ---------- */
  .month-row{
    display:flex;gap:8px;overflow-x:auto;
    padding:4px 2px 14px;
    -ms-overflow-style:none;scrollbar-width:none;
  }
  .month-row::-webkit-scrollbar{display:none;}
  .month-pill{
    flex:none;
    background:#fff;
    border:1.5px solid var(--border);
    color:var(--ink);
    border-radius:999px;
    padding:8px 16px;
    font-size:13px;
    font-weight:700;
    white-space:nowrap;
  }
  .month-pill .cnt{color:var(--muted);font-weight:400;margin-right:4px;}
  .month-pill.active{
    background:var(--pool-deep);
    border-color:var(--pool-deep);
    color:#fff;
  }
  .month-pill.active .cnt{color:#CDE9F2;}

  /* ---------- session list ---------- */
  .session-item{
    background:var(--card-bg);
    border:1px solid var(--border);
    border-radius:12px;
    padding:13px 14px;
    margin-bottom:9px;
    display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
  }
  .session-date{font-size:14px;font-weight:700;color:var(--ink);}
  .session-note{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.5;}
  .icon-btn{
    flex:none;
    background:var(--foam);
    border:none;
    width:30px;height:30px;border-radius:9px;
    display:flex;align-items:center;justify-content:center;
    color:var(--danger);
  }
  .icon-btn:focus-visible{outline:2px solid var(--danger);outline-offset:1px;}

  /* ---------- buttons / forms ---------- */
  .btn-primary{
    background:var(--coral);color:#fff;border:none;
    padding:13px 18px;border-radius:12px;font-weight:700;font-size:14.5px;
    width:100%;
  }
  .btn-primary:focus-visible{outline:2px solid var(--pool-deep);outline-offset:2px;}
  .btn-secondary{
    background:#fff;color:var(--ink);border:1.5px solid var(--border);
    padding:13px 18px;border-radius:12px;font-weight:700;font-size:14.5px;
    width:100%;
  }
  .btn-ghost-add{
    background:var(--foam);
    border:1.5px dashed var(--pool-bright);
    color:var(--pool-deep);
    padding:13px;border-radius:12px;
    font-weight:700;font-size:14px;
    width:100%;
    display:flex;align-items:center;justify-content:center;gap:7px;
    margin-bottom:16px;
  }
  .form-card{
    background:var(--card-bg);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:16px;
    margin-bottom:16px;
  }
  label{
    display:block;font-size:12.5px;font-weight:700;color:var(--muted);
    margin:0 0 6px;
  }
  .field{margin-bottom:14px;}
  input[type="text"], input[type="date"], input[type="time"], textarea{
    width:100%;
    border:1.5px solid var(--border);
    border-radius:10px;
    padding:11px 12px;
    font-size:14.5px;
    color:var(--ink);
    background:#fff;
  }
  input:focus-visible, textarea:focus-visible{outline:2px solid var(--pool-mid);outline-offset:1px;}
  textarea{resize:vertical;min-height:60px;}
  .row-btns{display:flex;gap:10px;}

  .chip-grid{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{
    border:1.5px solid var(--border);
    background:#fff;
    color:var(--ink);
    padding:9px 14px;
    border-radius:999px;
    font-size:13px;
    font-weight:700;
  }
  .chip.active{
    background:var(--pool-mid);
    border-color:var(--pool-mid);
    color:#fff;
  }
  .chip:focus-visible{outline:2px solid var(--pool-deep);outline-offset:2px;}

  .gc-edit-row{
    display:flex;gap:8px;padding:0 16px 14px;
  }
  .gc-edit-row button{
    flex:1;
    background:var(--foam);
    border:1px solid var(--border);
    border-radius:10px;
    padding:9px;
    font-size:12.5px;
    font-weight:700;
    color:var(--pool-deep);
    display:flex;align-items:center;justify-content:center;gap:5px;
  }

  .danger-link{
    color:var(--danger);
    background:none;border:none;
    font-size:13.5px;font-weight:700;
    text-decoration:underline;
    width:100%;text-align:center;
    padding:10px;
  }

  .loading-wrap{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:12px;color:var(--muted);font-size:13.5px;
  }
  .spinner{
    width:30px;height:30px;border-radius:50%;
    border:3px solid var(--border);
    border-top-color:var(--pool-mid);
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  
  .toast{
    position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:#fff;
    padding:10px 18px;border-radius:10px;font-size:13px;font-weight:700;
    z-index:50;
    box-shadow:0 6px 16px rgba(0,0,0,0.2);
  }

  /* ---------- Table for Stats ---------- */
  .stats-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--card-bg);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .stats-table th, .stats-table td {
    padding: 14px;
    text-align: right;
    border-bottom: 1px solid var(--border);
  }
  .stats-table th { background: var(--foam); font-size: 13.5px; color: var(--muted); }
  .stats-table td { font-size: 14.5px; font-weight: 700; }
  .stats-table tr:last-child td { border-bottom: none; }
  .print-only-header { display: none; }

  /* ---------- Control Sub-bar ---------- */
  .control-sub-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 18px 4px;
    font-size: 13px;
  }
  .control-sub-bar .lbl {
    font-weight: 700;
    color: var(--muted);
  }
  .control-sub-bar .actions {
    display: flex;
    gap: 12px;
  }

  /* ---------- Backup Modal Styles ---------- */
  .backup-option-card {
    background: var(--foam);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .backup-option-info {
    flex: 1;
    text-align: right;
  }
  .backup-option-info h4 {
    margin: 0 0 3px;
    font-size: 14px;
    font-weight: 700;
    color: var(--ink);
  }
  .backup-option-info p {
    margin: 0;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.4;
  }

  /* ---------- PRINT STYLES ---------- */
  @media print {
    body, html, #app {
      background: white !important;
      color: black !important;
      max-width: 100% !important;
      padding: 0 !important;
      margin: 0 !important;
      min-height: auto !important;
    }
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }
    .no-print, .fab, .icon-btn, .gc-edit-row, .btn-ghost-add, .control-sub-bar {
      display: none !important;
    }
    .print-only-header {
      display: block !important;
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--pool-deep);
    }
    .print-only-header h2 { margin: 0 0 5px; font-size: 24px; color: var(--pool-deep); }
    .print-only-header p { margin: 0; color: var(--muted); }
    
    header.top {
      background: none !important;
      color: var(--ink) !important;
      padding: 10px 0 !important;
    }
    header.top::after { display: none; }
    .stat-block {
      background: var(--foam) !important;
      color: var(--ink) !important;
      border: 1px solid var(--border) !important;
    }
    .stat-block .lbl { color: var(--muted) !important; }
    .session-item { border: 1px solid #ccc !important; break-inside: avoid; }
    .stats-table { border: 1px solid #ccc !important; }
    .stats-table th, .stats-table td { border-bottom: 1px solid #ccc !important; }
  }

</style>
</head>
<body>
<div id="app"><div class="loading-wrap"><div class="spinner"></div><div>بنحمل دفترك...</div></div></div>

<script>
(function(){
  "use strict";

  var DAYS = ["السبت","الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة"];
  var STORAGE_KEY = "coach-log-data-v2";

  var data = { groups: [], sessions: [] };
  var view = { screen: "home", groupId: null, month: null, showAddSession:false, showAddGroup:false, editingGroupId:null, showBackup:false };
  var toastTimer = null;

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
  function todayISO(){
    var d = new Date();
    var m = String(d.getMonth()+1).padStart(2,"0");
    var day = String(d.getDate()).padStart(2,"0");
    return d.getFullYear()+"-"+m+"-"+day;
  }
  function currentMonthKey(){ return todayISO().slice(0,7); }
  function monthKeyOf(dateStr){ return dateStr.slice(0,7); }

  function monthLabel(key){
    if(!key) return "";
    var parts = key.split("-");
    var d = new Date(parseInt(parts[0],10), parseInt(parts[1],10)-1, 1);
    return d.toLocaleDateString("ar-EG-u-nu-latn", { month:"long", year:"numeric" });
  }
  function dateLabel(dateStr){
    var parts = dateStr.split("-");
    var d = new Date(parseInt(parts[0],10), parseInt(parts[1],10)-1, parseInt(parts[2],10));
    return d.toLocaleDateString("ar-EG-u-nu-latn", { weekday:"long", day:"numeric", month:"long" });
  }
  function timeLabel(t){
    if(!t) return "";
    var parts = t.split(":");
    var h = parseInt(parts[0],10);
    var m = parts[1];
    var suffix = h >= 12 ? "م" : "ص";
    var h12 = h % 12; if(h12===0) h12 = 12;
    return h12 + ":" + m + " " + suffix;
  }
  function esc(s){
    return String(s==null?"":s).replace(/[&<>"']/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
    });
  }

  // --- Storage Wrapper (Handles Custom app storage & Web LocalStorage fallback) ---
  async function loadData(){
    try{
      let rawData = null;
      if (typeof window.storage !== "undefined" && window.storage.get) {
          let res = await window.storage.get(STORAGE_KEY, false);
          if (res && res.value) rawData = res.value;
      } else {
          rawData = localStorage.getItem(STORAGE_KEY);
      }
      
      if(rawData){
        var parsed = JSON.parse(rawData);
        data.groups = parsed.groups || [];
        data.sessions = parsed.sessions || [];
      }
    }catch(e){
      console.warn("Storage load error", e);
    }
  }
  async function saveData(){
    try{
      let stringData = JSON.stringify(data);
      if (typeof window.storage !== "undefined" && window.storage.set) {
          await window.storage.set(STORAGE_KEY, stringData, false);
      } else {
          localStorage.setItem(STORAGE_KEY, stringData);
      }
    }catch(e){
      showToast("في مشكلة في الحفظ، حاول تاني");
    }
  }
  function showToast(msg){
    var existing = document.querySelector(".toast");
    if(existing) existing.remove();
    var t = document.createElement("div");
    t.className = "toast";
    t.textContent = msg;
    document.body.appendChild(t);
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ t.remove(); }, 2200);
  }

  function groupSessions(groupId){
    return data.sessions.filter(function(s){ return s.groupId === groupId; });
  }
  function groupSessionsForMonth(groupId, monthKey){
    return groupSessions(groupId).filter(function(s){ return monthKeyOf(s.date) === monthKey; })
      .sort(function(a,b){ return b.date.localeCompare(a.date); });
  }
  function monthsForGroup(groupId){
    var set = {};
    groupSessions(groupId).forEach(function(s){ set[monthKeyOf(s.date)] = true; });
    set[currentMonthKey()] = true;
    return Object.keys(set).sort().reverse();
  }
  function getAllMonthsInApp(){
    var set = {};
    data.sessions.forEach(function(s){ set[monthKeyOf(s.date)] = true; });
    set[currentMonthKey()] = true;
    return Object.keys(set).sort().reverse();
  }

  // --- SVGs & Icons ---
  function iconWave(size, color){
    return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">'+
      '<path d="M2 8c1.5-2 3.5-2 5 0s3.5 2 5 0 3.5-2 5 0 3.5 2 5 0" stroke="'+color+'" stroke-width="2" stroke-linecap="round"/>'+
      '<path d="M2 14c1.5-2 3.5-2 5 0s3.5 2 5 0 3.5-2 5 0 3.5 2 5 0" stroke="'+color+'" stroke-width="2" stroke-linecap="round" opacity="0.6"/>'+
      '</svg>';
  }
  function iconPlus(color){
    return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="'+color+'" stroke-width="2.5" stroke-linecap="round"/></svg>';
  }
  function iconTrash(color){
    return '<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13" stroke="'+color+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  }
  function iconEdit(color){
    return '<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M4 20l4-1 11-11-3-3L5 16l-1 4z" stroke="'+color+'" stroke-width="2" stroke-linejoin="round"/></svg>';
  }
  function iconBack(color){
    return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="'+color+'" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  }
  function iconPrint(color){
    return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6v-8z" stroke="'+color+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  }
  function iconDownload(color){
    return '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 3v13m0 0l-4-4m4 4l4-4M4 19h16" stroke="'+color+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  }
  function iconUpload(color){
    return '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 16V3m0 0L8 7m4-4l4 4M4 19h16" stroke="'+color+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  }

  // --- Backup Actions ---
  function exportBackup() {
    try {
      var jsonStr = JSON.stringify(data, null, 2);
      var blob = new Blob([jsonStr], { type: "application/json" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      var dateStr = new Date().toISOString().slice(0, 10);
      a.href = url;
      a.download = "coach_backup_" + dateStr + ".json";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast("تم تحميل ملف النسخة الاحتياطية بنجاح ✅");
    } catch (e) {
      showToast("عفواً، فشل تصدير البيانات.");
    }
  }

  function handleImportFile(e) {
    var file = e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = async function(evt) {
      try {
        var importedData = JSON.parse(evt.target.result);
        if(importedData && Array.isArray(importedData.groups) && Array.isArray(importedData.sessions)) {
          if(confirm("تحذير ⚠️\nاستيراد هذا الملف سيقوم بمسح كافة المجموعات والحصص الحالية واستبدالها بالبيانات الجديدة. هل أنت متأكد من الاستمرار؟")) {
            data.groups = importedData.groups;
            data.sessions = importedData.sessions;
            await saveData();
            showToast("تم استيراد كل البيانات بنجاح! 🎉");
            view.showBackup = false;
            render();
          }
        } else {
          showToast("الملف الذي اخترته غير صالح أو تالف.");
        }
      } catch(err) {
        showToast("حدث خطأ أثناء قراءة الملف.");
      }
    };
    reader.readAsText(file);
    // Reset the input value so the same file can be selected again
    e.target.value = "";
  }

  // ---------------- render ----------------
  function render(){
    var app = document.getElementById("app");
    if(view.screen === "home"){
      app.innerHTML = renderHome();
    } else if(view.screen === "group"){
      app.innerHTML = renderGroupDetail();
    } else if(view.screen === "global-stats"){
      app.innerHTML = renderGlobalStats();
    } else if(view.screen === "group-stats"){
      app.innerHTML = renderGroupStats();
    }
  }

  function renderHome(){
    var groups = data.groups;
    var html = '';
    html += '<header class="top"><div class="brand">'+iconWave(28,'#ffffff')+
      '<div><h1>دفتر الكوتش</h1><p class="sub">سجّل شغلك في كل مجموعة</p></div></div></header>';
    html += '<div class="lane-rope"></div>';
    
    // Quick control bar
    html += '<div class="control-sub-bar no-print">';
    html += '<span class="lbl">أدوات التحكم</span>';
    html += '<div class="actions">';
    html += '<button class="link-btn" data-action="open-global-stats">التقرير العام</button>';
    html += '<span style="color: var(--border);">|</span>';
    html += '<button class="link-btn" data-action="open-backup" style="color: var(--coral-dark);">الأمان والنسخ</button>';
    html += '</div>';
    html += '</div>';

    html += '<main>';

    if(groups.length === 0){
      html += '<div class="empty">'+iconWave(48,'#9CC4D2')+
        '<p>لسه مفيش مجموعات.<br>ضيف أول مجموعة بمواعيدها وابدأ تسجّل شغلك.</p></div>';
    } else {
      html += '<div class="section-title">';
      html += '<span>المجموعات ('+groups.length+')</span>';
      html += '</div>';
      
      groups.forEach(function(g){
        var mKey = currentMonthKey();
        var count = groupSessionsForMonth(g.id, mKey).length;
        var daysTxt = (g.days && g.days.length) ? g.days.join(' و') : 'بدون أيام محددة';
        var timeTxt = g.time ? timeLabel(g.time) : '';
        html += '<div class="group-card">'+
          '<button class="gc-top" data-action="open-group" data-id="'+g.id+'">'+
            '<div class="gc-badge"><span class="n">'+count+'</span><span class="l">'+monthLabel(mKey).split(' ')[0]+'</span></div>'+
            '<div style="flex:1;text-align:right;">'+
              '<p class="gc-name">'+esc(g.name || daysTxt)+'</p>'+
              '<p class="gc-meta">'+esc(daysTxt)+(timeTxt ? ' · '+timeTxt : '')+'</p>'+
            '</div>'+
          '</button>'+
        '</div>';
      });
    }
    html += '</main>';
    html += '<div class="fab no-print"><button class="fab-inner" data-action="open-add-group">'+iconPlus('#fff')+' إضافة مجموعة</button></div>';

    if(view.showAddGroup || view.editingGroupId){
      html += renderGroupFormOverlay();
    }
    if(view.showBackup){
      html += renderBackupOverlay();
    }
    return html;
  }

  function renderGroupFormOverlay(){
    var editing = view.editingGroupId ? data.groups.find(function(g){return g.id===view.editingGroupId;}) : null;
    var name = editing ? editing.name : '';
    var days = editing ? editing.days : [];
    var time = editing ? editing.time : '';
    var html = '<div class="no-print" style="position:fixed;inset:0;background:rgba(11,57,84,0.45);z-index:30;display:flex;align-items:flex-end;" data-action="overlay-bg">';
    html += '<div class="form-card" id="group-form-card" style="margin:0;width:100%;max-width:480px;margin:0 auto;border-radius:20px 20px 0 0;max-height:88vh;overflow-y:auto;">';
    html += '<h3 style="margin:0 0 16px;font-size:17px;">'+(editing ? 'تعديل المجموعة' : 'مجموعة جديدة')+'</h3>';
    html += '<div class="field"><label>اسم المجموعة (اختياري)</label><input type="text" id="f-name" value="'+esc(name)+'" placeholder="مثلاً: مجموعة المبتدئين"></div>';
    html += '<div class="field"><label>الأيام</label><div class="chip-grid" id="f-days">';
    DAYS.forEach(function(d){
      var active = days.indexOf(d) !== -1;
      html += '<button type="button" class="chip'+(active?' active':'')+'" data-action="toggle-chip" data-day="'+d+'">'+d+'</button>';
    });
    html += '</div></div>';
    html += '<div class="field"><label>الميعاد</label><input type="time" id="f-time" value="'+esc(time)+'"></div>';
    html += '<div class="row-btns">';
    html += '<button class="btn-secondary" data-action="cancel-group-form">إلغاء</button>';
    html += '<button class="btn-primary" data-action="save-group" data-id="'+(editing?editing.id:'')+'">حفظ</button>';
    html += '</div>';
    if(editing){
      html += '<button class="danger-link" data-action="delete-group" data-id="'+editing.id+'">حذف المجموعة نهائيًا</button>';
    }
    html += '</div></div>';
    return html;
  }

  function renderBackupOverlay(){
    var html = '<div class="no-print" style="position:fixed;inset:0;background:rgba(11,57,84,0.45);z-index:30;display:flex;align-items:flex-end;" data-action="close-backup">';
    html += '<div class="form-card" id="backup-card" style="margin:0;width:100%;max-width:480px;margin:0 auto;border-radius:20px 20px 0 0;max-height:88vh;overflow-y:auto;padding: 24px 20px;">';
    
    html += '<h3 style="margin:0 0 8px;font-size:18px;">الأمان والنسخ الاحتياطي</h3>';
    html += '<p style="font-size:13px; color:var(--muted); margin:0 0 20px; line-height:1.6;">بما أن بياناتك مسجلة بالكامل على ذاكرة تليفونك، ننصحك بتحميل نسخة احتياطية من حين لآخر لحماية شغلك من الضياع عند مسح المتصفح أو تغيير الهاتف.</p>';
    
    // Option 1: Export
    html += '<div class="backup-option-card" style="cursor: pointer;" data-action="trigger-export">';
    html += '<div style="background:var(--card-bg); border:1px solid var(--border); border-radius:10px; width:44px; height:44px; display:flex; align-items:center; justify-content:center; color:var(--pool-mid);">'+iconDownload('var(--pool-mid)')+'</div>';
    html += '<div class="backup-option-info">';
    html += '<h4>تصدير نسخة احتياطية</h4>';
    html += '<p>تحميل ملف يحتوي على كل مجموعاتك وحصصك وحفظه على الموبايل.</p>';
    html += '</div>';
    html += '</div>';

    // Option 2: Import
    html += '<div class="backup-option-card" style="cursor: pointer;" data-action="trigger-import-click">';
    html += '<div style="background:var(--card-bg); border:1px solid var(--border); border-radius:10px; width:44px; height:44px; display:flex; align-items:center; justify-content:center; color:var(--coral);">'+iconUpload('var(--coral)')+'</div>';
    html += '<div class="backup-option-info">';
    html += '<h4>استيراد نسخة احتياطية</h4>';
    html += '<p>رفع ملف مسبق محفوظ لاسترجاع مجموعاتك وسجلات الحصص.</p>';
    html += '</div>';
    html += '</div>';

    // Hidden input for file selection
    html += '<input type="file" id="import-file-input" style="display:none;" accept=".json">';

    html += '<button class="btn-secondary" style="margin-top:8px;" data-action="close-backup">إغلاق</button>';
    html += '</div></div>';
    return html;
  }

  function renderGroupDetail(){
    var g = data.groups.find(function(gr){return gr.id === view.groupId;});
    if(!g){ view.screen = "home"; return renderHome(); }
    if(!view.month) view.month = currentMonthKey();

    var daysTxt = (g.days && g.days.length) ? g.days.join(' و') : 'بدون أيام محددة';
    var timeTxt = g.time ? timeLabel(g.time) : '';

    var html = '';
    html += '<header class="top no-print">';
    html += '<div class="back-row"><button class="back-btn" data-action="go-home">'+iconBack('#fff')+' رجوع</button></div>';
    html += '<div style="margin-top:16px;"><h1 style="font-size:19px;">'+esc(g.name || daysTxt)+'</h1>';
    html += '<p class="sub">'+esc(daysTxt)+(timeTxt?' · '+timeTxt:'')+'</p></div>';
    html += '</header>';
    html += '<div class="lane-rope no-print"></div>';
    html += '<div class="gc-edit-row no-print" style="padding-top:14px;">';
    html += '<button data-action="open-edit-group" data-id="'+g.id+'">'+iconEdit('#146C94')+' تعديل المعاد'+'</button>';
    html += '</div>';

    html += '<main>';

    var months = monthsForGroup(g.id);
    html += '<div class="month-row no-print">';
    months.forEach(function(mk){
      var cnt = groupSessionsForMonth(g.id, mk).length;
      var active = mk === view.month;
      html += '<button class="month-pill'+(active?' active':'')+'" data-action="set-month" data-month="'+mk+'">'+monthLabel(mk)+'<span class="cnt"> · '+cnt+'</span></button>';
    });
    html += '</div>';

    var sessions = groupSessionsForMonth(g.id, view.month);
    
    html += '<div class="section-title">';
    html += '<span>ملخص '+monthLabel(view.month)+'</span>';
    html += '<button class="link-btn no-print" data-action="open-group-stats">تقرير للطباعة</button>';
    html += '</div>';

    html += '<div class="stat-block"><div class="big">'+sessions.length+'</div><div class="lbl">حصة في هذا الشهر</div></div>';

    html += '<div class="section-title no-print">الحصص المسجّلة</div>';
    html += '<button class="btn-ghost-add no-print" data-action="open-add-session">'+iconPlus('#0B3954')+' تسجيل حصة جديدة</button>';

    if(view.showAddSession){
      html += renderAddSessionForm();
    }

    if(sessions.length === 0){
      html += '<div class="empty" style="padding:30px 16px;">'+iconWave(36,'#9CC4D2')+'<p>لسه مفيش حصص مسجلة في '+monthLabel(view.month)+'.</p></div>';
    } else {
      sessions.forEach(function(s){
        html += '<div class="session-item">'+
          '<div><div class="session-date">'+dateLabel(s.date)+'</div>'+
          (s.note ? '<div class="session-note">'+esc(s.note)+'</div>' : '')+
          '</div>'+
          '<button class="icon-btn no-print" data-action="delete-session" data-id="'+s.id+'">'+iconTrash('#D14848')+'</button>'+
        '</div>';
      });
    }

    html += '</main>';

    if(view.editingGroupId){
      html += renderGroupFormOverlay();
    }
    return html;
  }

  // --- Group Stats Report (Printable) ---
  function renderGroupStats(){
    var g = data.groups.find(function(gr){return gr.id === view.groupId;});
    if(!g){ view.screen = "home"; return renderHome(); }
    if(!view.month) view.month = currentMonthKey();

    var sessions = groupSessionsForMonth(g.id, view.month);
    var groupName = g.name || (g.days && g.days.length ? g.days.join(' و') : 'بدون اسم');

    var html = '';
    html += '<header class="top no-print">';
    html += '<div class="back-row">';
    html += '<button class="back-btn" data-action="open-group" data-id="'+g.id+'">'+iconBack('#fff')+' رجوع</button>';
    html += '<button class="print-btn" onclick="window.print()">'+iconPrint('#fff')+' اطبع التقرير</button>';
    html += '</div>';
    html += '<div style="margin-top:16px;"><h1 style="font-size:19px;">تقرير المجموعة</h1><p class="sub">'+esc(groupName)+'</p></div>';
    html += '</header>';

    html += '<main>';
    
    html += '<div class="print-only-header">';
    html += '<h2>تقرير الحصص الشهري</h2>';
    html += '<p>المجموعة: <strong>'+esc(groupName)+'</strong> | الشهر: <strong>'+monthLabel(view.month)+'</strong></p>';
    html += '</div>';

    html += '<div class="stat-block"><div class="big">'+sessions.length+'</div><div class="lbl">إجمالي الحصص في '+monthLabel(view.month)+'</div></div>';

    if(sessions.length > 0){
      html += '<table class="stats-table" style="margin-top:20px;">';
      html += '<thead><tr><th>م</th><th>التاريخ</th><th>اليوم</th><th>ملاحظات</th></tr></thead><tbody>';
      sessions.forEach(function(s, index){
        let parts = s.date.split("-");
        let d = new Date(parseInt(parts[0],10), parseInt(parts[1],10)-1, parseInt(parts[2],10));
        let dayName = d.toLocaleDateString("ar-EG", { weekday:"long" });
        let dateVal = d.toLocaleDateString("ar-EG", { day:"numeric", month:"numeric", year:"numeric" });
        
        html += '<tr>';
        html += '<td>'+(index+1)+'</td>';
        html += '<td>'+dateVal+'</td>';
        html += '<td>'+dayName+'</td>';
        html += '<td>'+(s.note ? esc(s.note) : '-')+'</td>';
        html += '</tr>';
      });
      html += '</tbody></table>';
    } else {
      html += '<div class="empty"><p>لا يوجد حصص مسجلة في هذا الشهر.</p></div>';
    }

    html += '</main>';
    return html;
  }

  // --- Global Stats Report (Printable) ---
  function renderGlobalStats(){
    if(!view.globalMonth) view.globalMonth = currentMonthKey();
    let allMonths = getAllMonthsInApp();
    
    var html = '';
    html += '<header class="top no-print">';
    html += '<div class="back-row">';
    html += '<button class="back-btn" data-action="go-home">'+iconBack('#fff')+' رجوع</button>';
    html += '<button class="print-btn" onclick="window.print()">'+iconPrint('#fff')+' اطبع الملخص</button>';
    html += '</div>';
    html += '<div style="margin-top:16px;"><h1 style="font-size:19px;">إحصائيات كل المجاميع</h1></div>';
    html += '</header>';

    html += '<main>';

    html += '<div class="month-row no-print">';
    allMonths.forEach(function(mk){
      var active = mk === view.globalMonth;
      html += '<button class="month-pill'+(active?' active':'')+'" data-action="set-global-month" data-month="'+mk+'">'+monthLabel(mk)+'</button>';
    });
    html += '</div>';

    html += '<div class="print-only-header">';
    html += '<h2>ملخص شغل الكوتش الشهري</h2>';
    html += '<p>عن شهر: <strong>'+monthLabel(view.globalMonth)+'</strong></p>';
    html += '</div>';

    let totalGlobalSessions = 0;
    let groupRows = '';

    data.groups.forEach(function(g){
      let count = groupSessionsForMonth(g.id, view.globalMonth).length;
      if(count > 0 || view.globalMonth === currentMonthKey()) {
        totalGlobalSessions += count;
        let gName = g.name || (g.days && g.days.length ? g.days.join(' و') : 'بدون اسم');
        groupRows += '<tr>';
        groupRows += '<td>'+esc(gName)+'</td>';
        groupRows += '<td>'+count+' حصة</td>';
        groupRows += '</tr>';
      }
    });

    html += '<div class="stat-block" style="background:var(--coral);"><div class="big">'+totalGlobalSessions+'</div><div class="lbl">إجمالي الحصص لكل المجاميع</div></div>';

    if(groupRows !== '') {
      html += '<table class="stats-table" style="margin-top:20px;">';
      html += '<thead><tr><th>المجموعة</th><th>عدد الحصص المسجلة</th></tr></thead>';
      html += '<tbody>'+groupRows+'</tbody>';
      html += '</table>';
    } else {
      html += '<div class="empty"><p>لا يوجد شغل مسجل لأي مجموعة في هذا الشهر.</p></div>';
    }

    html += '</main>';
    return html;
  }

  // ---------------- events (Event Delegation) ----------------
  document.body.addEventListener('click', async function(e){
    var actionEl = e.target.closest('[data-action]');
    if(!actionEl) return;
    
    // Prevent internal clicks from propagating to overlay backgrounds
    if(actionEl.id === "group-form-card" || actionEl.id === "backup-card"){
      e.stopPropagation();
      return;
    }

    var action = actionEl.getAttribute("data-action");
    var id = actionEl.getAttribute("data-id");

    if(action === "open-group"){
      view.screen = "group"; view.groupId = id; view.month = null; view.showAddSession = false;
      render();
    }
    else if(action === "go-home"){
      view.screen = "home"; view.groupId = null; view.showAddSession=false; view.editingGroupId=null;
      render();
    }
    else if(action === "open-global-stats"){
      view.screen = "global-stats"; view.globalMonth = null;
      render();
    }
    else if(action === "open-group-stats"){
      view.screen = "group-stats";
      render();
    }
    else if(action === "open-add-group"){
      view.showAddGroup = true; view.editingGroupId = null;
      render();
    }
    else if(action === "open-edit-group"){
      view.editingGroupId = id; view.showAddGroup = false;
      render();
    }
    else if(action === "cancel-group-form"){
      view.showAddGroup = false; view.editingGroupId = null;
      render();
    }
    else if(action === "overlay-bg"){
      if(e.target === actionEl){
        view.showAddGroup = false; view.editingGroupId = null;
        render();
      }
    }
    else if(action === "open-backup"){
      view.showBackup = true;
      render();
    }
    else if(action === "close-backup"){
      view.showBackup = false;
      render();
    }
    else if(action === "trigger-export"){
      exportBackup();
    }
    else if(action === "trigger-import-click"){
      var fileInput = document.getElementById("import-file-input");
      if(fileInput) fileInput.click();
    }
    else if(action === "toggle-chip"){
      actionEl.classList.toggle("active");
    }
    else if(action === "save-group"){
      var nameVal = document.getElementById("f-name").value.trim();
      var timeVal = document.getElementById("f-time").value;
      var activeChips = document.querySelectorAll("#f-days .chip.active");
      var daysVal = Array.from(activeChips).map(function(c){return c.getAttribute("data-day");});
      daysVal.sort(function(a,b){ return DAYS.indexOf(a) - DAYS.indexOf(b); });

      if(id){
        var g = data.groups.find(function(gr){return gr.id===id;});
        g.name = nameVal; g.days = daysVal; g.time = timeVal;
      } else {
        data.groups.push({ id: uid(), name: nameVal, days: daysVal, time: timeVal, createdAt: todayISO() });
      }
      await saveData();
      view.showAddGroup = false; view.editingGroupId = null;
      showToast("اتحفظت المجموعة");
      render();
    }
    else if(action === "delete-group"){
      if(confirm("متأكد إنك عايز تمسح المجموعة دي؟ هيتمسح معاها كل الحصص المسجلة.")){
        data.groups = data.groups.filter(function(g){return g.id!==id;});
        data.sessions = data.sessions.filter(function(s){return s.groupId!==id;});
        await saveData();
        view.editingGroupId = null; view.showAddGroup=false;
        view.screen = "home"; view.groupId = null;
        showToast("اتمسحت المجموعة");
        render();
      }
    }
    else if(action === "set-month"){
      view.month = actionEl.getAttribute("data-month");
      view.showAddSession = false;
      render();
    }
    else if(action === "set-global-month"){
      view.globalMonth = actionEl.getAttribute("data-month");
      render();
    }
    else if(action === "open-add-session"){
      view.showAddSession = true;
      render();
      var dateInput = document.getElementById("s-date");
      if(dateInput) dateInput.focus();
    }
    else if(action === "cancel-add-session"){
      view.showAddSession = false;
      render();
    }
    else if(action === "save-session"){
      var dateVal = document.getElementById("s-date").value || todayISO();
      var noteVal = document.getElementById("s-note").value.trim();
      data.sessions.push({ id: uid(), groupId: view.groupId, date: dateVal, note: noteVal });
      await saveData();
      view.showAddSession = false;
      view.month = monthKeyOf(dateVal);
      showToast("اتسجلت الحصة");
      render();
    }
    else if(action === "delete-session"){
      if(confirm("تمسح الحصة دي من السجل؟")){
        data.sessions = data.sessions.filter(function(s){return s.id!==id;});
        await saveData();
        showToast("اتمسحت الحصة");
        render();
      }
    }
  });

  // Dynamic change routing for local file importing
  document.body.addEventListener('change', function(e){
    if(e.target && e.target.id === 'import-file-input'){
      handleImportFile(e);
    }
  });

  // Init APP
  loadData().then(function(){
    render();
  });

})();
</script>
</body>
</html>
